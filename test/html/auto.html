<!DOCTYPE html">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" xmlns:hui="http://humanise.dk/ui">
<head>
  <title>HUI</title>
  <link type="text/css" href="style.css" rel="stylesheet" />
  <link type="text/css" href="../../bin/development.css" rel="stylesheet" />
  <script data-hui-context="../..">hui={_:[],on:function(){this._.push(arguments)}};</script>
</head>

<body>
  <div class="description">
    <h1>Annotated configuration</h1>
  </div>

  <a href="#" class="hui_button"><span><span>This is a button using nocript</span></span><noscript data-type="Button">{"confirm":{"text":"It works!"}}</noscript></a>

  <a href="#" class="hui_button" data-hui="Button">
    This is a button using comment
    <!--{"name":"myCommentButton","confirm":{"text":"It works!"}}-->
  </a>

  <a href="#" class="hui_button">
    This is a button
    <script type="hui" data-type="Button">{"name":"myOtherButton","confirm":{"text":"Sure?"}}</script>
  </a>

  <a href="#" class="hui_button" data-hui="Button" data-options='{"name":"someName","confirm":{"text":"Sure?"}}'>
    This is a button
  </a>

  <a href="#" class="hui_button" data-hui='Button {"name":"someName","confirm":{"text":"Sure?"}}'>
    This is a button with data-hui
  </a>

  <button class="hui_button" hui:component="Button" hui:name="namespacedButton" hui:click!="alert(0)">This is a namespaced button</button>

  <hr/>

  <textarea class="hui_textinput" data-hui='TextInput'></textarea>

  <script>
    hui.on(() => {
      console.log('Ready!')
    });
    hui.on(['hui.ui'],function() {
      hui.log('UI is ready: ' + hui.ui.getContext());
      hui.control({
        $click$myCommentButton : function() {
          hui.ui.msg({text: 'The comment button was clicked!', duration: 2000})
        },
        'namespacedButton.click!'() {
          hui.ui.msg({text: 'The namespaced button was clicked!', duration: 2000})
        }
      })
    })
  </script>

  <script src="../../js/hui.js"></script>
  <script>
    hui.on(['hui.ui','hui.ui.Overlay','hui.ui.Button'],function() {
      console.log(hui.ui.Overlay, hui.ui.Button)
    });
  </script>
  <script src="../../js/hui_animation.js"></script>
  <script src="../../js/hui_auto.js"></script>
  <script src="../../js/hui_color.js"></script>
  <script src="../../js/hui_control.js"></script>
  <script src="../../js/ui.js"></script>
  <script src="../../js/Button.js"></script>
  <script src="../../js/TextInput.js"></script>
  <script src="../../js/Overlay.js"></script>
</body>
</html>
